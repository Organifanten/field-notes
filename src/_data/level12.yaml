levels:
  - title: "Level 1"
    tasks:
      - title: "Geht eine Stunde zusammen spazieren. Frische Luft regt gute Gespräche an."
        detail: "Bewegung und Umgebung helfen, Gedanken in Fluss zu bringen. Lasst das Gespräch locker entstehen. Es geht nicht um Arbeit, sondern ums Kennenlernen. Nutzt die Zeit, um zu verstehen, wie jede:r tickt."
      - title: "Erstellt Mind Maps über euch selbst, z.B. mit Herkunft, Interessen, Werten."
        detail: "Visualisiert, was euch prägt und antreibt. So seht ihr Gemeinsamkeiten und Unterschiede auf einen Blick. Präsentiert eure Mind Maps kurz und stellt neugierige Fragen dazu."
      - title: "Sammelt so viele Gemeinsamkeiten zwischen euch, wie ihr könnt."
        detail: "Findet heraus, was euch verbindet, vom Lieblingsessen bis zu geteilten Werten. Je mehr Überschneidungen ihr entdeckt, desto leichter wächst Vertrautheit. Achtet darauf, dass jede:r zu Wort kommt."
      - title: "Teamcharta: Wozu gibt es unser Team? Welches Ziel verfolgen wir?"
        detail: "Definiert gemeinsam euren Auftrag und Zweck. Ein klares „Wozu“ schafft Richtung und Motivation. Notiert das Ergebnis sichtbar als Grundlage für spätere Entscheidungen."

  - title: "Level 2"
    tasks:
      - title: "Spielt ein Partyspiel zusammen, z.B. Tabu, Activity, Codenames oder Cards against Humanity."
        detail: "Ein gemeinsames Spiel bringt Leichtigkeit und Humor ins Team. Achtet darauf, dass alle mitmachen können und niemand bloßgestellt wird. Genießt die Zeit miteinander."
      - title: "Erzählt zwei Wahrheiten und eine Unwahrheit über euch. Ratet, was die Unwahrheiten sind."
        detail: "Eine spielerische Übung, um sich besser kennenzulernen. Achtet auf Überraschungen und lacht gemeinsam über unerwartete Geschichten. Ideal zum Auflockern nach einem langen Arbeitstag."
      - title: "Beantwortet gegenseitig ein paar der Dropbox-Fragen, die euch interessieren."
        detail: "Wählt 3–5 Fragen, die Neugier wecken, z.B. zu Kindheit, Lernen oder Werten. Die Antworten fördern Verständnis füreinander. Achtet darauf, wirklich zuzuhören – nicht gleich zu kommentieren."
      - title: "Retrospektive: Wie fühlt sich unsere Zusammenarbeit bisher an?"
        detail: "Haltet kurz inne und sprecht offen über euer Miteinander. Was funktioniert gut, wo hakt’s? Jede:r nennt einen Aspekt, der beibehalten oder verändert werden sollte."

  - title: "Level 3"
    tasks:
      - title: "Geht gemeinsam Mittagessen, außerhalb des Firmengeländes."
        detail: "Ein Ortswechsel öffnet neue Gespräche. Vermeidet Arbeitsthemen. Sprecht lieber über Erlebnisse, Interessen oder Pläne. Das stärkt Nähe und Verständnis jenseits des Berufs."
      - title: "Erzählt euch, welche Stärken ihr bei euren Teammitgliedern wahrnehmt."
        detail: "Wertschätzung sichtbar machen. Jede:r bekommt ehrliches Feedback zu seinen/ihren Stärken. Achtet auf Konkretheit und Authentizität. Das schafft Vertrauen und Motivation."
      - title: "Gebt euch einen Teamnamen, mit dem ihr euch alle identifiziert. Nicht der kleinste gem. Nenner."
        detail: "Ein Teamname stärkt Identität. Wählt etwas, das euch verbindet oder inspiriert – ruhig humorvoll. Wichtig ist, dass alle sich wiederfinden können."
      - title: "Teamcharta: Wie treffen wir Entscheidungen?"
        detail: "Klärt, wie ihr Beschlüsse fasst: durch Konsens, Mehrheit oder Verantwortung einzelner. Haltet fest, wer wann eingebunden wird. Das reduziert Missverständnisse im Alltag."

  - title: "Level 4"
    tasks:
      - title: "Spielt ein kooperatives Spiel zusammen, z.B. Magic Maze, Order Overload oder Pandemic."
        detail: "Kooperative Spiele fördern gemeinsames Planen und Vertrauen. Achtet darauf, wie ihr kommuniziert und wer die Initiative übernimmt. Sprecht danach kurz darüber, was euch im Zusammenspiel aufgefallen ist."
      - title: "Übung in 3er-Gruppen: Reden, Zuhören, Spiegeln."
        detail: "Eine Person erzählt, die zweite hört aktiv zu, die dritte spiegelt das Gehörte. Danach wechselt ihr die Rollen. Achtet auf echtes Zuhören, nicht auf Ratschläge. Diese Übung stärkt Empathie und Präsenz"
      - title: "Schreibt jedem Teammitglied kurze, persönliche Danke-Zettel in der nächsten Woche."
        detail: "Ein handgeschriebener Dank wirkt stärker als jede Mail. Seid konkret, wofür ihr euch bedankt. Die Zettel können anonym oder offen sein. Wichtig ist, dass sie ehrlich gemeint sind."
      - title: "Retrospektive: Was stärkt unser Vertrauen?"
        detail: "Sammelt Momente, in denen Vertrauen sichtbar wurde. Sprecht darüber, was euch sicher fühlen lässt und was Vertrauen schwächt. Leitet daraus kleine, konkrete Vereinbarungen ab."

  - title: "Level 5"
    tasks:
      - title: "Schreibt auf, was für Ecken und Kanten eure Teammitglieder haben und spielt Bingo damit."
        detail: "Ein spielerischer Weg, um Eigenheiten sichtbar zu machen. Achtet auf Humor ohne Verletzungen. Danach besprecht: Welche Unterschiede helfen uns, welche fordern uns heraus?"
      - title: "Erstellt einen Team-Glossar mit den 30 wichtigsten Begriffen für euer Team."
        detail: "Sammelt Fachbegriffe, Abkürzungen und interne Wörter. So entsteht ein gemeinsames Verständnis und neue Kolleg:innen finden sich schneller zurecht."
      - title: "Visualisiert: Wie laufen Aufgaben bei uns eigentlich ab?"
        detail: "Zeichnet gemeinsam den typischen Ablauf von der Idee bis zum Ergebnis. So werden Engpässe und Missverständnisse sichtbar. Diskutiert, wo ihr einfacher oder klarer werden könnt."
      - title: "Teamcharta: Welche Arbeitsweisen wollen wir beibehalten oder ändern?"
        detail: "Reflektiert euer Vorgehen: Was funktioniert gut, was sollte sich ändern? Formuliert 2–3 Prinzipien, die euch wichtig sind. Hängt sie sichtbar auf, damit sie im Alltag wirken."

  - title: "Level 6"
    tasks:
      - title: "Spielt ein Wettbewerbsspiel zusammen, z.B. die Siedler, 7 Wonders oder Risiko."
        detail: "Ein bisschen Wettbewerb zeigt, wie ihr mit Druck und Ehrgeiz umgeht. Beobachtet, wie ihr reagiert, wenn es knapp wird. Sprecht danach offen über Teamdynamik und Emotionen."
      - title: "Jede:r formuliert einen Wunsch für die Zukunft: „Etwas, das ich mir von dir wünsche…“."
        detail: "Wünsche sind sanfter als Kritik und öffnen Gespräche. Achtet auf Wertschätzung und Klarheit. Notiert die Wünsche, um später zu prüfen, ob sie Wirkung zeigen."
      - title: "Sammelt eure Erfolge der letzten Monate und feiert sie kurz."
        detail: "Holt euch den Stolz zurück! Listet, was ihr erreicht habt, groß und klein. Kurze Anerkennung stärkt Motivation und Zusammenhalt."
      - title: "Retrospektive: Sind wir mit unserem Ziel auf Kurs?"
        detail: "Prüft euer gemeinsames Ziel und den Fortschritt dahin. Diskutiert, was euch stärkt und was bremst. Schließt mit einer konkreten Entscheidung, wie ihr weitermacht."

  - title: "Level 7"
    tasks:
      - title: "Macht ein Teamfoto, dass ihr euch im Ruhestand gerne anschaut."
        detail: "Ein Foto mit Augenzwinkern und Bedeutung. Wählt Motiv, Ort und Stimmung gemeinsam. Es darf Spaß machen. Hauptsache, es spiegelt euer Teamgefühl wider."
      - title: "Wir in 5 Sätzen: Formuliert gemeinsam euer Selbstbild in fünf Kernsätzen."
        detail: "Eine verdichtete Beschreibung eurer Identität. Diskutiert, was euch besonders macht, was ihr beitragt, wofür ihr steht. Die Sätze dienen als Leitstern für künftige Entscheidungen."
      - title: "Erstellt einen Info Radiator. Visualisiert eure wichtigsten Kennzahlen, Learnings, Fortschritte."
        detail: "Ein transparenter Überblick über den Teamstatus. Nutzt ein Whiteboard oder digitales Tool. Regelmäßige Aktualisierung schafft Fokus und Verantwortlichkeit."
      - title: "Teamcharta: Wofür wollen wir stehen?"
        detail: "Kondensiert euer Selbstverständnis in klare Aussagen. Welche Werte, welche Haltung prägen euch? Diese Diskussion stärkt eure kulturelle Klarheit."

  - title: "Level 8"
    tasks:
      - title: "Plant ein gemeinsames Training, z.B. zu Kommunikation oder Konfliktlösung."
        detail: "Lernen als Team schweißt zusammen. Wählt ein Thema, das euch wirklich betrifft, und sorgt für gemeinsame Reflexion danach. Wichtig ist, dass jede:r etwas daraus mitnimmt."
      - title: "Reflektiert, wie ihr in Stresssituationen reagiert."
        detail: "Sammelt typische Stressmomente und sprecht über eure Reaktionen. Verständnis für unterschiedliche Muster beugt Eskalationen vor. Entwickelt kleine Hilfen für akute Phasen."
      - title: "Erzählt euch, wer euer Konfliktverhalten geprägt hat, z.B. Familie, Freunde, oder die Schule."
        detail: "Biografische Gespräche schaffen Verständnis für Unterschiede. Achtet auf Vertrauen und Freiwilligkeit. Ihr lernt, Konflikte weniger persönlich zu nehmen."
      - title: "Retrospektive: Was brauchen wir, um Konflikte produktiv zu nutzen?"
        detail: "Besprecht, welche Bedingungen konstruktive Auseinandersetzungen fördern. Verbindet diese Erkenntnisse mit eurer Charta. So werden Konflikte zu Lernmomenten statt Bedrohungen."

  - title: "Level 9"
    tasks:
      - title: "Macht einen Witze Wettbewerb: Der beste Witz gewinnt."
        detail: "Humor entspannt und verbindet. Wählt ein Format, bei dem jede:r zum Zug kommt. Achtet auf respektvollen Umgang und lacht miteinander, nicht übereinander."
      - title: "Diskutiert, wie die Belbin-Rollenbeschreibungen zu euch passen."
        detail: "Analysiert eure Teamrollen: Wer übernimmt welche Stärken und Aufgaben? Die Diskussion fördert Verständnis und Ausgleich im Team. Nutzt das Wissen, um Verantwortlichkeiten bewusster zu gestalten."
      - title: "Probiert verschiedene Entscheidungsformate aus."
        detail: "Experimentiert mit Konsent, Mehrheitsentscheid oder Delegation. Beobachtet, welche Methode wann funktioniert. So entwickelt ihr Flexibilität und Klarheit in Entscheidungen."
      - title: "Teamcharta: Wer macht was und ist wofür zuständig?"
        detail: "Haltet Zuständigkeiten und Entscheidungsräume fest. Klare Rollen verhindern Reibungsverluste. Überprüft regelmäßig, ob die Aufteilung noch passt."

  - title: "Level 10"
    tasks:
      - title: "Plant eine gemeinsame Volunteer-Aktion, z.B. Müll aufsammeln oder aufforsten."
        detail: "Gemeinsames Engagement schafft Sinn über die Arbeit hinaus. Wählt etwas, das euch bewegt, und organisiert es selbst. Das stärkt Zusammenhalt und Stolz."
      - title: "Diskutiert, welche Arten von Konflikten es gibt, z.B. Missverständnis, Zielkonflikt, Wertekonflikt."
        detail: "Einordnen hilft, Konflikte zu verstehen statt zu vermeiden. Nutzt Beispiele aus eurer Praxis. Ziel ist nicht, sie zu lösen, sondern zu begreifen."
      - title: "Diskutiert, welche Werte bei Konflikten berührt werden, z. B. Fairness, Tempo, Zuverlässigkeit."
        detail: "Werte erklären Emotionen. Wenn ihr erkennt, welche Werte betroffen sind, könnt ihr respektvoller diskutieren. Macht eure wichtigsten Werte sichtbar."
      - title: "Retrospektive: Wie gehen wir miteinander um, wenn es schwierig wird?"
        detail: "Nehmt schwierige Situationen als Lernchance. Sammelt, was euch geholfen hat – und was ihr künftig anders machen wollt. Kleine Absprachen können große Wirkung haben."

  - title: "Level 11"
    tasks:
      - title: "Plant gemeinsam die Feier für das Erreichen von Level 12."
        detail: "Feiern stärkt Gemeinschaft und Motivation. Verteilt Aufgaben, damit alle beitragen. Eine gute Feier würdigt die gemeinsame Reise."
      - title: "Jede:r nennt etwas, das er/sie an den anderen besonders schätzt."
        detail: "Wertschätzung verbindet. Nehmt euch Zeit, ehrlich und konkret zu sein. Der Moment bleibt in Erinnerung – oft stärker als jedes Feedbackgespräch."
      - title: "Überarbeitet euren Team-Glossar und Info Radiator."
        detail: "Bringt eure Dokumente auf den aktuellen Stand. Was hat sich geändert, was hat sich bewährt? Gemeinsames Pflegen zeigt Verantwortung und Transparenz."
      - title: "Teamcharta: Was bleibt bestehen, was darf sich ändern?"
        detail: "Der Rückblick in die Zukunft: Was wollt ihr bewahren, was loslassen? Diese Übung sichert, dass Weiterentwicklung bewusst bleibt."

  - title: "Level 12"
    tasks:
      - title: "Jede:r zieht jemanden, dem er/sie symbolisch etwas zur Abschlussfeier schenkt."
        detail: "Ein Symbol oder kleine Geste zeigt Wertschätzung. Achtet darauf, dass die Geschenke persönlich und respektvoll sind. So entsteht ein verbindender Abschlussmoment."
      - title: "Visualisiert eure Reise mit Highlights, Wendepunkten und Aha-Momenten."
        detail: "Blickt gemeinsam zurück und zeichnet euren Weg. Diese Reflexion stärkt Stolz und Zusammengehörigkeit. Nutzt die Erkenntnisse für euren nächsten Abschnitt."
      - title: "Erzählt euch, welche Entwicklung ihr bei euch selbst und im Team seit Level 1 seht."
        detail: "Reflexion über Veränderung fördert Bewusstsein und Reife. Jede:r teilt, was gewachsen ist – fachlich wie menschlich. Dankbarkeit darf dabei Platz haben."
      - title: "Feiert das Erreichen von Level 12 mit Musik, Essen, Rückblick, Fotos."
        detail: "Ein würdiger Abschluss eurer gemeinsamen Reise. Genießt den Moment, teilt Erinnerungen und lacht miteinander. Dieses Erlebnis trägt euch in kommende Herausforderungen."
